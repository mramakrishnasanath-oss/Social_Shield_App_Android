name: Android Mobile E2E Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  e2e-testing:
    runs-on: self-hosted
    env:
      ANDROID_HOME: C:\Users\sanat\AppData\Local\Android\Sdk
      ANDROID_SDK_ROOT: C:\Users\sanat\AppData\Local\Android\Sdk
    
    steps:
      - name: Add Git Bash and Android SDK to PATH
        run: |
          echo C:\Program Files\Git\bin>> "%GITHUB_PATH%"
          echo C:\Users\sanat\AppData\Local\Android\Sdk\emulator>> "%GITHUB_PATH%"
          echo C:\Users\sanat\AppData\Local\Android\Sdk\platform-tools>> "%GITHUB_PATH%"
          "C:\Program Files\Git\bin\git.exe" config --global core.longPaths true
        shell: cmd

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'SocialShieldAppium/package.json'

      - name: Build Debug APK
        shell: bash
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          mkdir -p ../app-build
          cp app/build/outputs/apk/debug/app-debug.apk ../app-build/SocialShield.apk
          echo "APK_PATH=$(pwd -W)/../app-build/SocialShield.apk" >> $GITHUB_ENV

      - name: Enable KVM Hardware Acceleration
        if: runner.os == 'Linux'
        run: |
          echo "Checking KVM availability..."
          egrep -c '(vmx|svm)' /proc/cpuinfo || true
          sudo adduser $USER kvm
          sudo chown $USER /dev/kvm
          echo "KVM setup complete."

      - name: Start Android Emulator
        shell: bash
        run: |
          echo "Starting Android Emulator (Pixel_9_Pro)..."
          emulator -avd Pixel_9_Pro -no-window -no-audio -no-boot-anim > /dev/null 2>&1 &
          echo "Waiting for emulator to connect..."
          adb wait-for-device
          echo "Waiting for emulator to boot completed..."
          for i in {1..90}; do
            BOOT_STATUS=$(adb shell getprop sys.boot_completed | tr -d '\r')
            if [ "$BOOT_STATUS" = "1" ]; then
              echo "Emulator booted successfully."
              break
            fi
            if [ $i -eq 90 ]; then
              echo "Timeout waiting for emulator to boot."
              exit 1
            fi
            sleep 2
          done

      - name: Run E2E Tests
        shell: bash
        run: |
          chmod +x ./SocialShieldAppium/scripts/ci_run_tests.sh
          APK_PATH="${{ env.APK_PATH }}" ./SocialShieldAppium/scripts/ci_run_tests.sh

      - name: Stop Android Emulator
        if: always()
        shell: bash
        run: |
          echo "Stopping Android Emulator..."
          adb emu kill || true

      - name: Copy Reports for Archive & History
        if: always()
        shell: bash
        run: |
          mkdir -p reports/latest
          mkdir -p reports/history/build-${{ github.run_number }}
          cp -r SocialShieldAppium/reports/* reports/latest/ || true
          cp -r SocialShieldAppium/reports/* reports/history/build-${{ github.run_number }}/ || true

      - name: Upload Test Artifacts (Excel & HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SocialShield-E2E-Reports
          path: |
            reports/latest/
            SocialShieldAppium/reports/SocialShield_Test_Report.xlsx
            SocialShieldAppium/reports/execution-report.html

      - name: Deploy Test Reports to GitHub Pages
        if: always()
        shell: bash
        run: |
          echo "Deploying reports to gh-pages branch..."
          
          # Clean up any leftover worktree or directory from previous failed runs
          git worktree prune || true
          rm -rf gh-pages-dir || true
          
          # Setup git config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          REMOTE="origin"
          
          # Fetch gh-pages branch
          git fetch $REMOTE gh-pages || true
          
          # Check if branch exists on remote
          if git show-ref --verify --quiet refs/remotes/$REMOTE/gh-pages; then
            echo "gh-pages branch found. Checking it out in worktree..."
            git worktree add -B gh-pages gh-pages-dir $REMOTE/gh-pages
            # Clean latest report directory to avoid stale files
            rm -rf gh-pages-dir/reports/latest
          else
            echo "gh-pages branch not found. Creating orphan branch..."
            git worktree add --detach gh-pages-dir
            cd gh-pages-dir
            git checkout --orphan gh-pages
            git rm -rf .
            cd ..
          fi
          
          # Copy new reports
          mkdir -p gh-pages-dir/reports
          cp -r reports/* gh-pages-dir/reports/
          
          # Commit and push
          cd gh-pages-dir
          git add reports/
          
          if git diff --quiet --cached; then
            echo "No changes to deploy."
          else
            git commit -m "Deploy E2E reports: build ${GITHUB_RUN_NUMBER}"
            git push $REMOTE gh-pages
          fi
          
          # Clean up worktree
          cd ..
          git worktree remove --force gh-pages-dir || true
          rm -rf gh-pages-dir || true

