name: Android Mobile E2E Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-testing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'SocialShieldAppium/package.json'

      - name: Install dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Build Debug APK
        run: |
          cd flutter_app
          flutter build apk --debug
          mkdir -p ../app-build
          cp build/app/outputs/flutter-apk/app-debug.apk ../app-build/SocialShield.apk
          echo "APK_PATH=$(pwd)/../app-build/SocialShield.apk" >> $GITHUB_ENV

      - name: Enable KVM Hardware Acceleration
        run: |
          echo "Checking KVM availability..."
          egrep -c '(vmx|svm)' /proc/cpuinfo || true
          sudo adduser $USER kvm
          sudo chown $USER /dev/kvm
          echo "KVM setup complete."

      - name: Run E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot-load -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            chmod +x ./SocialShieldAppium/scripts/ci_run_tests.sh
            APK_PATH="${{ env.APK_PATH }}" ./SocialShieldAppium/scripts/ci_run_tests.sh

      - name: Copy Reports for Archive & History
        if: always()
        run: |
          mkdir -p reports/latest
          mkdir -p reports/history/build-${{ github.run_number }}
          cp -r SocialShieldAppium/reports/* reports/latest/ || true
          cp -r SocialShieldAppium/reports/* reports/history/build-${{ github.run_number }}/ || true

      - name: Upload Test Artifacts (Excel & HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SocialShield-E2E-Reports
          path: |
            reports/latest/
            SocialShieldAppium/reports/SocialShield_Test_Report.xlsx
            SocialShieldAppium/reports/execution-report.html

      - name: Deploy Test Reports to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        if: always()
        with:
          branch: gh-pages
          folder: reports/
          target-folder: reports/
