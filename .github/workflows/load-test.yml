name: SocialShield API Load Test Suite

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/load-test.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/load-test.yml'
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Target Backend Service Base URL'
        required: false
        default: 'http://localhost:8000'

jobs:
  api-load-test:
    name: Execute k6 API Load Test (100 VUs, 1m)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python for Backend Service
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Start SocialShield FastAPI Backend Service
        if: ${{ env.BACKEND_URL == '' && github.event.inputs.backend_url == '' }}
        run: |
          cd backend
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Setup k6 Action
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Load Test
        env:
          BACKEND_URL: ${{ github.event.inputs.backend_url || env.BACKEND_URL || 'http://localhost:8000' }}
        run: |
          k6 run backend/scripts/load-test.js --summary-export=summary.json

      - name: Parse & Publish Performance Metrics Step Summary
        if: always()
        run: |
          node backend/scripts/parseK6Summary.js summary.json

      - name: Upload Load Test Results & Summary Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-summary
          path: summary.json
          retention-days: 14
