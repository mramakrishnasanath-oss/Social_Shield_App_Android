name: SocialShield Appium Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  appium-tests:
    runs-on: self-hosted
    env:
      ANDROID_HOME: C:\Users\sanat\AppData\Local\Android\Sdk
      ANDROID_SDK_ROOT: C:\Users\sanat\AppData\Local\Android\Sdk

    steps:
    - name: Add Git Bash and Android SDK to PATH
      run: |
        echo C:\Program Files\Git\bin>> "%GITHUB_PATH%"
        echo C:\Users\sanat\AppData\Local\Android\Sdk\emulator>> "%GITHUB_PATH%"
        echo C:\Users\sanat\AppData\Local\Android\Sdk\platform-tools>> "%GITHUB_PATH%"
        "C:\Program Files\Git\bin\git.exe" config --global core.longPaths true
      shell: cmd

    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Add local Maven and Global npm to PATH
      shell: bash
      run: |
        echo "c:/Users/sanat/Downloads/SocialShield/SocialShield/apache-maven-3.9.6/bin" >> $GITHUB_PATH
        echo "C:\Users\sanat\AppData\Roaming\npm" >> $GITHUB_PATH

    - name: Enable KVM group perms
      if: runner.os == 'Linux'
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Set up Java 21 JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node.js for Appium Server
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Appium 2.x and UiAutomator2 Driver
      shell: bash
      run: |
        npm install -g appium
        appium driver install uiautomator2 || true

    - name: Build Android App debug APK
      shell: bash
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
        # Copy to the path configured in config.properties
        mkdir -p $GITHUB_WORKSPACE/app-build/
        cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/app-build/SocialShield.apk

    - name: Start Android Emulator
      shell: bash
      run: |
        echo "Starting Android Emulator (Pixel_9_Pro)..."
        emulator -avd Pixel_9_Pro -no-window -no-audio -no-boot-anim -no-snapshot-load \
          -memory 2048 -cores 2 > /dev/null 2>&1 &
        echo "Waiting for emulator to connect..."
        adb wait-for-device
        echo "Waiting for emulator to boot completed..."
        for i in {1..90}; do
          BOOT_STATUS=$(adb shell getprop sys.boot_completed | tr -d '\r')
          if [ "$BOOT_STATUS" = "1" ]; then
            echo "Emulator booted successfully."
            break
          fi
          if [ $i -eq 90 ]; then
            echo "Timeout waiting for emulator to boot."
            exit 1
          fi
          sleep 2
        done

    - name: Dismiss Blocking Dialogs Post-Boot
      shell: bash
      run: |
        echo "Dismissing any post-boot dialogs (System UI ANR, 16KB compat, etc.)..."
        ADB="${ANDROID_HOME}/platform-tools/adb"
        # Wait a few seconds for dialogs to appear
        sleep 5
        # Dismiss dialogs: press BACK, HOME, and tap OK positions multiple times
        for round in {1..3}; do
          echo "  [round $round] Pressing BACK/HOME and tapping dialog buttons..."
          $ADB shell input keyevent 4  2>/dev/null || true
          sleep 0.5
          $ADB shell input keyevent 4  2>/dev/null || true
          sleep 0.5
          $ADB shell input keyevent 3  2>/dev/null || true
          sleep 0.5
          # Tap "OK" / "Close" at typical dialog positions for 1080p screen
          $ADB shell input tap 540 1400 2>/dev/null || true
          sleep 0.3
          $ADB shell input tap 540 1600 2>/dev/null || true
          sleep 0.3
          # Also tap "Wait" in ANR dialog (usually bottom-left button)
          $ADB shell input tap 200 1400 2>/dev/null || true
          sleep 0.3
          sleep 2
        done
        echo "Dialog dismissal complete."

    - name: Pre-install APK and Clear Dialogs
      shell: bash
      run: |
        ADB="${ANDROID_HOME}/platform-tools/adb"
        APK_PATH="${GITHUB_WORKSPACE}/app-build/SocialShield.apk"
        echo "Pre-installing APK with test/grant flags to avoid dialog prompts..."
        
        # Run install in background so we can dismiss dialogs while it waits
        $ADB install -r -t -g "$APK_PATH" &
        INSTALL_PID=$!
        
        for i in {1..12}; do
          sleep 5
          if ! kill -0 $INSTALL_PID 2>/dev/null; then break; fi
          echo "  [dismiss during install] Pressing BACK/HOME and tapping OK..."
          $ADB shell input keyevent 4  2>/dev/null || true
          $ADB shell input keyevent 4  2>/dev/null || true
          $ADB shell input keyevent 3  2>/dev/null || true
          $ADB shell input tap 540 1400 2>/dev/null || true
          $ADB shell input tap 540 1600 2>/dev/null || true
          $ADB shell input tap 200 1400 2>/dev/null || true
        done
        
        if wait $INSTALL_PID; then
          echo "APK pre-installed successfully."
        else
          echo "APK pre-install failed (Appium will handle installation)."
        fi
        
        # Final dialog clear
        $ADB shell input keyevent 4  2>/dev/null || true
        $ADB shell input keyevent 3  2>/dev/null || true
        sleep 2

    - name: Run Appium Tests
      shell: bash
      run: |
        # Start Appium Server in background
        appium --port 4723 --log-level warn > /tmp/appium.log 2>&1 &
        APPIUM_PID=$!
        
        # Wait for Appium server to be ready
        for i in {1..30}; do
          if curl -s "http://localhost:4723/" > /dev/null 2>&1; then
            echo "Appium server is ready."
            break
          fi
          sleep 1
        done
        
        # Convert GITHUB_WORKSPACE to forward slashes for sed to prevent backslash escaping issues on Windows
        WORKSPACE_FORWARD=$(echo "$GITHUB_WORKSPACE" | tr '\\' '/')
        
        # Overwrite app.path and platform.version in config.properties to match runner settings
        sed -i "s|app.path=.*|app.path=$WORKSPACE_FORWARD/app-build/SocialShield.apk|g" AppiumFramework/config.properties
        sed -i "s|platform.version=.*|platform.version=14|g" AppiumFramework/config.properties
        sed -i "s|device.name=.*|device.name=emulator-5554|g" AppiumFramework/config.properties
        
        cd AppiumFramework && mvn clean test
        TEST_EXIT_CODE=$?
        
        kill $APPIUM_PID || true
        exit $TEST_EXIT_CODE

    - name: Stop Android Emulator
      if: always()
      shell: bash
      run: |
        echo "Stopping Android Emulator..."
        adb emu kill || true

    - name: Copy Reports to Host Machine Workspace
      if: always()
      shell: bash
      run: |
        mkdir -p /c/Users/sanat/Downloads/SocialShield/SocialShield/AppiumFramework/reports/
        cp -r AppiumFramework/reports/* /c/Users/sanat/Downloads/SocialShield/SocialShield/AppiumFramework/reports/ || true

    - name: Upload Test Automation Reports Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: SocialShield-QA-Reports
        path: |
          AppiumFramework/reports/
          AppiumFramework/logs/
