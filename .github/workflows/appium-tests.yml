name: SocialShield Appium Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  appium-tests:
    runs-on: macos-latest # macOS has hardware virtualization support on Apple Silicon runners

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java 21 JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node.js for Appium Server
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Appium 2.x and UiAutomator2 Driver
      run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Start Appium Server
      run: |
        nohup appium --port 4723 > /dev/null 2>&1 &

    - name: Build Android App debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
        # Copy to the path configured in config.properties
        mkdir -p /Users/runner/work/SocialShield/SocialShield/app-build/
        cp app/build/outputs/apk/debug/app-debug.apk /Users/runner/work/SocialShield/SocialShield/app-build/SocialShield.apk

    - name: Set up Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        target: google_apis
        arch: arm64-v8a
        script: |
          # Overwrite app.path in config.properties to match runner directories
          sed -i '' 's|app.path=.*|app.path=/Users/runner/work/SocialShield/SocialShield/app-build/SocialShield.apk|g' AppiumFramework/config.properties
          cd AppiumFramework
          mvn clean test

    - name: Upload Test Automation Reports Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: SocialShield-QA-Reports
        path: |
          AppiumFramework/reports/
          AppiumFramework/logs/
