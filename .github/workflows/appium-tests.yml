name: SocialShield Appium Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  appium-tests:
    runs-on: self-hosted
    env:
      ANDROID_HOME: C:\Users\sanat\AppData\Local\Android\Sdk
      ANDROID_SDK_ROOT: C:\Users\sanat\AppData\Local\Android\Sdk

    steps:
    - name: Add Git Bash and Android SDK to PATH
      run: |
        echo C:\Program Files\Git\bin>> "%GITHUB_PATH%"
        echo C:\Users\sanat\AppData\Local\Android\Sdk\emulator>> "%GITHUB_PATH%"
        echo C:\Users\sanat\AppData\Local\Android\Sdk\platform-tools>> "%GITHUB_PATH%"
      shell: cmd

    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Enable KVM group perms
      if: runner.os == 'Linux'
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Set up Java 21 JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node.js for Appium Server
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Appium 2.x and UiAutomator2 Driver
      shell: bash
      run: |
        npm install -g appium
        appium driver install uiautomator2 || true

    - name: Build Android App debug APK
      shell: bash
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
        # Copy to the path configured in config.properties
        mkdir -p $GITHUB_WORKSPACE/app-build/
        cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/app-build/SocialShield.apk

    - name: Start Android Emulator
      shell: bash
      run: |
        echo "Starting Android Emulator (Pixel_9_Pro)..."
        emulator -avd Pixel_9_Pro -no-window -no-audio -no-boot-anim > /dev/null 2>&1 &
        echo "Waiting for emulator to connect..."
        adb wait-for-device
        echo "Waiting for emulator to boot completed..."
        for i in {1..90}; do
          BOOT_STATUS=$(adb shell getprop sys.boot_completed | tr -d '\r')
          if [ "$BOOT_STATUS" = "1" ]; then
            echo "Emulator booted successfully."
            break
          fi
          if [ $i -eq 90 ]; then
            echo "Timeout waiting for emulator to boot."
            exit 1
          fi
          sleep 2
        done

    - name: Run Appium Tests
      shell: bash
      run: |
        # Start Appium Server in background
        appium --port 4723 --log-level warn > /tmp/appium.log 2>&1 &
        APPIUM_PID=$!
        
        # Overwrite app.path and platform.version in config.properties to match runner settings
        sed -i "s|app.path=.*|app.path=$GITHUB_WORKSPACE/app-build/SocialShield.apk|g" AppiumFramework/config.properties
        sed -i "s|platform.version=.*|platform.version=11.0|g" AppiumFramework/config.properties
        
        cd AppiumFramework && mvn clean test
        TEST_EXIT_CODE=$?
        
        kill $APPIUM_PID || true
        exit $TEST_EXIT_CODE

    - name: Stop Android Emulator
      if: always()
      shell: bash
      run: |
        echo "Stopping Android Emulator..."
        adb emu kill || true

    - name: Upload Test Automation Reports Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: SocialShield-QA-Reports
        path: |
          AppiumFramework/reports/
          AppiumFramework/logs/
