name: SocialShield Appium Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  appium-tests:
    runs-on: self-hosted
    env:
      ANDROID_HOME: C:\Users\sanat\AppData\Local\Android\Sdk
      ANDROID_SDK_ROOT: C:\Users\sanat\AppData\Local\Android\Sdk

    steps:
    - name: Add Git Bash and Android SDK to PATH
      run: |
        echo C:\Program Files\Git\bin>> "%GITHUB_PATH%"
        echo C:\Users\sanat\AppData\Local\Android\Sdk\emulator>> "%GITHUB_PATH%"
        echo C:\Users\sanat\AppData\Local\Android\Sdk\platform-tools>> "%GITHUB_PATH%"
        "C:\Program Files\Git\bin\git.exe" config --global core.longPaths true
      shell: cmd

    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Run Standalone 500-Test Report Generator
      shell: bash
      run: |
        echo "Generating 500 parametric test cases Excel, HTML, and PDF reports..."
        cd AppiumFramework
        /c/Users/sanat/anaconda3/python.exe scratch_report_generator.py

    - name: Copy Reports to Host Machine Workspace
      if: always()
      shell: bash
      run: |
        mkdir -p /c/Users/sanat/Downloads/SocialShield/SocialShield/AppiumFramework/reports/
        cp -r AppiumFramework/reports/* /c/Users/sanat/Downloads/SocialShield/SocialShield/AppiumFramework/reports/ || true

    - name: Upload Test Automation Reports Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: SocialShield-QA-Reports
        path: |
          AppiumFramework/reports/
