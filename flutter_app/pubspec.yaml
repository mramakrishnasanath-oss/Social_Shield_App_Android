name: socialshield
description: AI-Based Smart Mobile Security, Fraud Detection & Optimization Suite
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.2

  # Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Local Storage
  shared_preferences: ^2.2.3

  # Camera
  camera: ^0.11.0+1
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3

  # UI / Animations
  lottie: ^3.1.0
  fl_chart: ^0.67.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  glass_kit: ^3.0.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  connectivity_plus: ^6.0.5
  local_auth: ^2.3.0
  flutter_local_notifications: ^17.2.2
  image: ^4.1.7
  path_provider: ^2.1.3
  path: ^1.9.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.4.0
  audioplayers: ^6.7.1
  firebase_messaging: ^15.2.10
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
